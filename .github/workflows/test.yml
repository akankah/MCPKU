name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: pytest (ubuntu-latest, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git \
            libpq-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # Core deps from requirements.txt
          python -m pip install -r requirements.txt
          # Test extras
          python -m pip install pytest pytest-asyncio

      - name: Run full test suite
        env:
          # CI env: no external services available, so bifrost integration
          # tests auto-skip (they probe localhost:8080). Same for any DB/Redis.
          BIFROST_URL: http://localhost:8080/v1
          PYTHONIOENCODING: utf-8
        run: |
          python -m pytest tests/ -v --tb=short 2>&1 | tee pytest-output.log

      - name: Run benchmark suite (perf tests)
        # Separate job to keep main test output clean; perf tests print
        # speedup tables that are nice to read in CI logs.
        if: success()
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -m pytest tests/test_perf.py -v -s --tb=short

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-${{ matrix.python-version }}
          path: pytest-output.log
          retention-days: 7

  lint:
    name: Lint (syntax check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check all .py files
        run: |
          python -m compileall -q mcp_*.py tests/ || true
          echo "All files compiled successfully"

  summary:
    name: Test summary
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print job status
        run: |
          echo "## MCPKU CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| pytest (3.11 + 3.12 matrix) | ${{ needs.test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| lint | ${{ needs.lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
